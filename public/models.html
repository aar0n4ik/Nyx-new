<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Nyx — модели</title>
	<link rel="stylesheet" href="/models.css" />
	<style>
	/* QVAC branding (additive) */
	.qvac-banner{display:flex;gap:10px;align-items:center;justify-content:center;text-align:center;margin:0 0 16px;padding:12px 16px;border-radius:14px;font-size:13.5px;color:#0e7490;background:linear-gradient(135deg,rgba(8,145,178,.10),rgba(14,116,144,.05));border:1px solid rgba(8,145,178,.22)}
	.qvac-banner b{color:#0891b2}
	</style>
</head>
<body>
	<div class="drag"></div>
	<main class="wrap">
		<header class="head">
			<a class="back" href="/app">← В чат</a>
			<h1>Модели</h1>
			<p class="sub">Активная модель работает локально. Скачайте дополнительные и переключайтесь в один клик.</p>
		</header>
		<div class="qvac-banner">⚡ Все модели исполняются на движке <b>QVAC</b> (Tether) — 100% на устройстве. Доступны <b>QVAC-native</b> модели MedPsy.</div>
		<div id="list" class="list"></div>
		<div id="dl" class="dl hidden">
			<div class="dl-head"><span id="dl-name"></span><span id="dl-pct">0%</span></div>
			<div class="progress"><div id="bar" class="bar"></div></div>
			<div class="dl-meta"><span id="dl-size"></span><span id="dl-speed"></span><span id="dl-eta"></span></div>
			<div class="dl-actions">
				<button id="btn-pause" class="btn-ghost">Пауза</button>
				<button id="btn-resume" class="btn-ghost hidden">Продолжить</button>
				<button id="btn-cancel" class="btn-ghost danger">Отмена</button>
			</div>
		</div>
	</main>
	<script src="/models.js"></script>
</body>
</html>
