name: Build Nyx Installer
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run dist
      - name: Prune to production deps
        shell: bash
        run: npm prune --omit=dev
      - name: Package engine (node_modules)
        shell: bash
        run: tar -czf nyx-engine-win-x64.tar.gz node_modules
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            nyx-engine-win-x64.tar.gz
